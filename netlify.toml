[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — Netlify serves real files first, so this only catches
# unknown routes (sw.js, manifest, assets, icons are served directly).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
